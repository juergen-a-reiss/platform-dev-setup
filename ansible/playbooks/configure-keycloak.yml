---
# Keycloak Admin REST API: https://www.keycloak.org/docs-api/latest/rest-api/
- name: Configure Keycloak
  hosts: localhost
  gather_facts: false
  vars:
    keycloak_url: "http://keycloak:8080" # The internal port is 8080.
    keycloak_admin_user: "admin"
    keycloak_admin_password: "admin"
    realm_name: "platform"
    client_name: "platform"
    client_roles:
      - Subcontractor
      - HomeOffice
      - Support
      - Admin

  tasks:
    - name: Obtain admin access token
      uri:
        url: "{{ keycloak_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          client_id: admin-cli
          username: "{{ keycloak_admin_user }}"
          password: "{{ keycloak_admin_password }}"
          grant_type: password
        status_code: 200
      register: auth

    - name: Create realm '{{ realm_name }}'
      uri:
        url: "{{ keycloak_url }}/admin/realms"
        method: POST
        headers:
          Authorization: "Bearer {{ auth.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          realm: "{{ realm_name }}"
          enabled: true
          displayName: "Platform"
        status_code: [201, 409]
      register: realm

    - name: Report outcome
      debug:
        msg: "{{ 'Realm already exists — skipped.' if realm.status == 409 else 'Realm created successfully.' }}"

    - name: Configure realm '{{ realm_name }}'
      uri:
        url: "{{ keycloak_url }}/admin/realms/{{ realm_name }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ auth.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          realm: "{{ realm_name }}"
          # Login
          registrationAllowed: true
          loginTheme: "platform"
          rememberMe: true
          resetPasswordAllowed: true
          loginWithEmailAllowed: true
          registrationEmailAsUsername: true
          duplicateEmailsAllowed: false
          # Password policy: min 12, max 28, must not contain username,
          # and must not contain a repeating sequence of 4+ characters (e.g. asdfasdfasdf).
          # regexPattern requires the password to match — the negative lookahead (?!.*(.{4,})\1)
          # causes the match to fail when any 4+ char substring repeats consecutively.
          passwordPolicy: "length(12) and maxLength(28) and notUsername and regexPattern(^(?!.*(.{4,})\\1).*$) and passwordBlacklist(blacklist.txt)"
          # User events — retained for 90 days (90 * 24 * 3600 s)
          eventsEnabled: true
          eventsExpiration: 7776000
          adminEventsEnabled: true
          adminEventsDetailsEnabled: true
          # Brute force protection
          bruteForceProtected: true
          permanentLockout: false
          failureFactor: 5
          waitIncrementSeconds: 60
          maxFailureWaitSeconds: 900
          maxDeltaTimeSeconds: 43200
          quickLoginCheckMilliSeconds: 1000
        status_code: 204

    - name: Create client '{{ client_name }}'
      uri:
        url: "{{ keycloak_url }}/admin/realms/{{ realm_name }}/clients"
        method: POST
        headers:
          Authorization: "Bearer {{ auth.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          clientId: "{{ client_name }}"
          enabled: true
          publicClient: true
        status_code: [201, 409]

    - name: Fetch client UUID for '{{ client_name }}'
      uri:
        url: "{{ keycloak_url }}/admin/realms/{{ realm_name }}/clients?clientId={{ client_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ auth.json.access_token }}"
        status_code: 200
      register: client_info

    - name: Create client roles
      uri:
        url: "{{ keycloak_url }}/admin/realms/{{ realm_name }}/clients/{{ client_info.json[0].id }}/roles"
        method: POST
        headers:
          Authorization: "Bearer {{ auth.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ item }}"
        status_code: [201, 409]
      loop: "{{ client_roles }}"
