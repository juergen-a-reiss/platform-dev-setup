# Single-node Kafka cluster in KRaft mode (no ZooKeeper).
#

# Prerequisites:
#  Start postgres first so the shared network exists:
#  docker compose -f docker-compose-postgres.yaml up --force-recreate -d > logs/postgres.txt 
#
# Start Kafka:
#  docker compose -f docker-compose-kafka.yaml up --force-recreate -d > logs/kafka.txt
#

# Broker reachable at:
#  - localhost:9092     (from host)
#  - kafka:9092       (from other containers on shared_net)


networks:
  shared_net:
    external: true


services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: dockers-kafka-cluster-01
      KAFKA_JMX_PORT: ""
    ports:
      - "9092:29092"
    volumes:
      - kafka:/var/lib/kafka/data
    networks:
      - shared_net

volumes:
  kafka:
    driver: local