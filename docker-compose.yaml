networks:
  shared_net:
    name: shared_net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.200.0/24

services:
  # docker exec -it postgres psql -U dockers -d dockers
  postgres:
    profiles: [postgres]
    image: postgres:18.3
    pull_policy: missing
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: dockers
      POSTGRES_PASSWORD: dockers
      POSTGRES_DB: dockers
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql
      - ./src/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - shared_net

  # Admin console: http://localhost:2305 (admin / admin)
  #
  # Setup steps:
  #  0. DB is created automatically. The init scripts will fire when the data volume is empty (i.e., a fresh postgres instance). 
  #     If you already have a running volume without the keycloak database, you'll need to run it once manually: docker exec postgres psql -U dockers -c "CREATE DATABASE keycloak;" 
  #     — or wipe the volume with docker compose down -v and start fresh.    
  #  1. Replace the temporary admin user (master realm, role "admin")
  #  2. Create a realm "tests", a user, and set token TTL to 1000 min in realm settings
  keycloak:
    profiles: [keycloak]
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: keycloak
    command: start-dev
    depends_on:
      - postgres
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: dockers
      KC_DB_PASSWORD: dockers
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_SPI_THEME_CACHE_THEMES: false
      KC_SPI_THEME_CACHE_TEMPLATES: false
      KC_SPI_THEME_STATIC_MAX_AGE: -1
    ports:
      - "2305:8080"
    volumes:
      - ./src/keycloak-theme:/opt/keycloak/themes/platform
      - ./src/keycloak-blacklist:/opt/keycloak/data/password-blacklists:ro
    networks:
      - shared_net

  # Single-node Kafka cluster in KRaft mode (no ZooKeeper).
  # Broker reachable at:
  #  - localhost:9092   (from host)
  #  - kafka:9092       (from other containers on shared_net)
  kafka:
    profiles: [kafka]
    image: apache/kafka:4.0.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: dockers-kafka-cluster-01
      KAFKA_JMX_PORT: ""
    ports:
      - "9092:29092"
    volumes:
      - kafka:/var/lib/kafka/data
    networks:
      - shared_net

volumes:
  db-data:
    driver: local
  kafka:
    driver: local
